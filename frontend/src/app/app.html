<div class="shell" [class.menu-open]="menuOpen()">
  <!-- mobile top bar (hidden on desktop) -->
  <header class="mobile-topbar">
    <button class="hamburger" (click)="menuOpen.set(!menuOpen())" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="m-brand"><span class="brand-mark sm">B</span> BAPI</div>
  </header>

  <div class="nav-backdrop" (click)="menuOpen.set(false)"></div>

  <aside class="sidebar" [class.open]="menuOpen()">
    <div class="brand">
      <div class="brand-mark">B</div>
      <div class="brand-text">
        <strong>BAPI</strong>
        <span>SAP-Zugriffsintelligenz</span>
      </div>
    </div>

    <nav>
      @for (group of groups; track group.title) {
        <div class="nav-group">
          <span class="nav-group-title">{{ group.title }}</span>
          @for (item of group.items; track item.path) {
            <a [routerLink]="item.path" routerLinkActive="active" class="nav-item">
              <span class="nav-icon">{{ item.icon }}</span>
              {{ item.label }}
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-foot">
      <div class="conn">
        <span class="dot"></span>
        SAP: {{ connector() }}
      </div>
    </div>
  </aside>

  <main class="content" [class.full-bleed]="fullBleed()">
    <router-outlet />
  </main>
</div>
