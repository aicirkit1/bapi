<div class="app">
  <header class="appbar">
    <!-- yellow brand / utility bar -->
    <div class="brandbar">
      <span class="wordmark">BAPI</span>
      <div class="utils">
        <button class="util" title="Anwendungen">
          <brk-icon name="grid" [size]="18" />
        </button>
        <button class="util" title="Bestellungen">
          <brk-icon name="cart" [size]="19" />
          <span class="badge">2</span>
        </button>
        <span class="user">
          <span class="avatar"><brk-icon name="user" [size]="15" /></span>
          {{ currentUser }}
        </span>
        <button class="util" title="Hilfe">
          <brk-icon name="help" [size]="19" />
        </button>
      </div>
    </div>

    <!-- white menu bar -->
    <nav class="menubar">
      @for (m of menus; track m.label; let i = $index) {
        <div class="menu-wrap">
          <button
            class="menu-btn"
            [class.active]="activeIndex() === i"
            [class.open]="open() === i"
            (click)="toggle(i, $event)"
          >
            {{ m.label }} <span class="caret"></span>
          </button>
          @if (open() === i) {
            <div class="dropdown">
              @for (item of m.items; track item.label) {
                @if (item.header) {
                  <div class="dd-header">{{ item.label }}</div>
                } @else {
                  <button class="dd-item" (click)="select(item)">{{ item.label }}</button>
                }
              }
            </div>
          }
        </div>
      }
    </nav>
  </header>

  <main class="content" [class.full-bleed]="fullBleed()">
    <router-outlet />
  </main>
</div>
